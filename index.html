<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="script.js" defer></script>
        <link rel="stylesheet" href="styles.css">
        <title>Tic Tac Toe</title>
    </head>

    <body>
        <h1>Tic Tac Toe</h1>

        <div id="start-div">
            <form id="start-form">
                <div id="cards-div">
                    <div id="player1-card" class="player-card">
                        <h2>Player 1</h2>

                        <div class="form-div">
                            <label for="player1Name">Name</label>
                            <input type="text" id="player1Name" name="player1Name" placeholder="Enter name..." required>
                        </div>

                        <div class="form-div">
                            <p>Marker</p>

                            <div class="mark-div">
                                <label class="btn-label left-label">
                                    <input type="radio" name="player1Mark" value="X" checked>
                                    <span>X</span>
                                </label>
                                <label class="btn-label right-label">
                                    <input type="radio" name="player1Mark" value="O">
                                    <span>O</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-div">
                            <label class="btn-label starter-label">
                                <input type="radio" name="starter" value="1" checked>
                                <span>Starter</span>
                            </label>
                        </div>
                    </div>

                    <p>VS</p>

                    <div id="player2-card" class="player-card">
                        <h2>Player 2</h2>

                        <div class="form-div">
                            <label for="player1Name">Name</label>
                            <input type="text" id="player2Name" name="player2Name" placeholder="Enter name..." required>
                        </div>

                        <div class="form-div">
                            <p>Marker</p>

                            <div class="mark-div">
                                <label class="btn-label left-label">
                                    <input type="radio" name="player2Mark" value="X">
                                    <span>X</span>
                                </label>
                                <label class="btn-label right-label">
                                    <input type="radio" name="player2Mark" value="O" checked>
                                    <span>O</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-div">
                            <label class="btn-label starter-label">
                                <input type="radio" name="starter" value="2">
                                <span>Starter</span>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" id="start-btn">Start Game</button>
            </form>
        </div>

        <div id="game-div" hidden>
            <div id="game-status">
                <p id="status-text"></p>
            </div>

            <div id="game-board">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
        </div>
    </body>
</html>
