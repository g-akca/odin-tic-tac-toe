<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="script.js" defer></script>
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
        <title>Tic Tac Toe</title>
    </head>
    <body>
        <h1>Tic Tac Toe</h1>

        <div id="start-div">
            <form id="start-form">
                <div id="cards-div">
                    <div id="player1-card" class="player-card">
                        <h2>Player 1</h2>

                        <div class="form-div">
                            <label for="player1Name">Name</label>
                            <input type="text" id="player1Name" name="player1Name" placeholder="Enter name..." required>
                        </div>

                        <div class="form-div">
                            <p>Marker</p>
                            <div class="mark-div">
                                <label class="btn-label left-label">
                                    <input type="radio" name="player1Mark" value="X" checked>
                                    <span>X</span>
                                </label>
                                <label class="btn-label right-label">
                                    <input type="radio" name="player1Mark" value="O">
                                    <span>O</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-div">
                            <label class="btn-label starter-label">
                                <input type="radio" name="starter" value="1" checked>
                                <span>Starter</span>
                            </label>
                        </div>
                    </div>

                    <p>VS</p>

                    <div id="player2-card" class="player-card">
                        <h2>Player 2</h2>

                        <div class="form-div">
                            <label for="player1Name">Name</label>
                            <input type="text" id="player2Name" name="player2Name" placeholder="Enter name..." required>
                        </div>

                        <div class="form-div">
                            <p>Marker</p>
                            <div class="mark-div">
                                <label class="btn-label left-label">
                                    <input type="radio" name="player2Mark" value="X">
                                    <span>X</span>
                                </label>
                                <label class="btn-label right-label">
                                    <input type="radio" name="player2Mark" value="O" checked>
                                    <span>O</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-div">
                            <label class="btn-label starter-label">
                                <input type="radio" name="starter" value="2">
                                <span>Starter</span>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" id="start-btn">Start Game</button>
            </form>
        </div>

        <div id="game-div" hidden>
            <div>
                <div class="game-player">
                    <h2 id="player1-name">Player 1: <span></span></h2>
                    <p id="player1-mark"></p>
                </div>

                <div id="game-main">
                    <div id="game-status">
                        <p id="status-text"></p>
                    </div>

                    <div id="game-board">
                        <div class="cell"><span></span></div>
                        <div class="cell"><span></span></div>
                        <div class="cell"><span></span></div>
                        <div class="cell"><span></span></div>
                        <div class="cell"><span></span></div>
                        <div class="cell"><span></span></div>
                        <div class="cell"><span></span></div>
                        <div class="cell"><span></span></div>
                        <div class="cell"><span></span></div>
                    </div>
                </div>

                <div class="game-player">
                    <h2 id="player2-name">Player 2: <span></span></h2>
                    <p id="player2-mark"></p>
                </div>
            </div>

            <button type="button" id="reset-btn" hidden>Reset Game</button>
        </div>
    </body>
</html>
